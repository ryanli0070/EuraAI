# Run `fly launch --no-deploy` once to claim the app name, then `fly deploy`.
# Set secrets before first deploy:
#   fly secrets set OPENAI_API_KEY=sk-...
#   fly secrets set CORS_ORIGINS=https://your-frontend.vercel.app

app = "euraai-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # No local ML model — safe to auto-stop idle machines. Cold start is just
  # uvicorn (<1s) since OpenAI does all the heavy lifting remotely.
  auto_stop_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
